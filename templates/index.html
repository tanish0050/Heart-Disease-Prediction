<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .form-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background: #2575fc;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background: #1e3c72;
        }

        h3 {
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Heart Disease Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="sex" placeholder="Sex (1=Male,0=Female)" required>
        <input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required>
        <input type="number" name="trestbps" placeholder="Resting BP" required>
        <input type="number" name="chol" placeholder="Cholesterol" required>

        <!-- ⚠️ IMPORTANT: sirf ye 6 features use ho rahe -->
        <input type="number" name="thalach" placeholder="Max Heart Rate" required>

        <input type="submit" value="Predict">

    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}

</div>

</body>
</html>
